"$schema" = 'https://starship.rs/config-schema.json'
format = """
 $os\
 [î‚°](fg:os bg:black2)\
 $directory\
 ${custom.directory_mark_in_git}\
 ${custom.directory_mark}\
 ${custom.git_remote_exists}\
 $git_branch\
 $git_status\
 ${custom.git_mark}\
 $fill\
 [î‚˛](fg:magenta)\
 $cmd_duration\
 [î‚˛](fg:white bg:magenta)\
 $time
 $character\
 """


# Set 'foo' as custom color palette
palette = 'gruvbox_material_dark'

# Define custom colors
[palettes.gruvbox_material_dark]
os = '#34be5b'
blue = '#7daea3'
gray = '#504945'
magenta = '#d3869b'
black2 = '#3c3837'

[fill]
symbol = 'â”€'
style = 'gray'

# You can also replace your username with a neat symbol like ď„   or disable this
# and use the os module below

# An alternative to the username module which displays a symbol that
# represents the current operating system

[os]
style = "bg:os"                # Manjaro Green
format = "[$symbol]($style)"
disabled = false
symbols = { Manjaro = " ďŚ’  " }

[directory]
style = "fg:green bg:black2"
format = "[ $path ]($style)"
truncate_to_repo = false
truncation_length = 100
truncation_symbol = ""
before_repo_root_style = 'fg:green bg:black2'
repo_root_style = 'fg:green bold bg:black2'
repo_root_format = '[ $before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path ]($style)'

[custom.directory_mark_in_git]
when = "git status"
style = 'fg:black2 bg:gray'
format = '[$symbol]($style)'
symbol = 'î‚°'

[custom.directory_mark]
when = "not git status"
style = 'fg:black2'
format = '[$symbol]($style)'
symbol = 'î‚°'

[custom.git_remote_exists]
when = '''test "$(git remote -v | wc -l)" -gt 0'''
symbol = 'ď„“ '
style = 'bg:gray fg:blue'
format = '[ $symbol]($style)'

[custom.git_remote_none]
when = '''test "$(git remote -v | wc -l)" -lt 0'''
symbol = 'ď‡“ '
style = 'bg:gray fg:blue'
format = '[ $symbol]($style)'

[git_branch]
style = "bg:gray fg:blue"
symbol = 'ď„¦'
format = '[$remote_branch $symbol $branch]($style)'

[git_status]
style = "bg:gray fg:blue"
ahead = 'â‡ˇ$count'
behind = 'â‡Ł$count'
diverged = 'â‡•$count'
modified = ' +$count'
staged = ' !$count'
untracked = ' ?$count'
format = '[$modified$untracked$staged$ahead_behind ]($style)'

[custom.git_mark]
when = "git status"
style = 'fg:gray'
format = '[$symbol]($style)'
symbol = 'î‚°'

[cmd_duration]
style = "fg:black bg:magenta"
format = '[ $duration ď‰’  ]($style)'

[custom.duration_mark]
style = 'fg:black'
format = '[$symbol]($style)'
symbol = 'î‚˛'

[time]
disabled = false
time_format = "%H:%M:%S"
style = "bg:white fg:black"
format = '[ $time ]($style)'

[character]
success_symbol = "[âťŻ](bold green)"
error_symbol = "[âťŻ](bold red)"
